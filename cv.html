<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Brendan Henrique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #pdf-canvas { display: block; margin: 0 auto; max-width: 100%; }
        #pdf-container { overflow-y: auto; }
    </style>

    <script data-goatcounter="https://brendanhenrique.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-10 border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-lg font-bold text-[#003262]">Brendan Henrique</a>
                <div class="hidden sm:flex items-center space-x-6 text-gray-600">
                    <a href="index.html" class="hover:text-[#003262] transition-colors">Home</a>
                    <a href="publications.html" class="hover:text-[#003262] transition-colors">Publications</a>
                    <a href="cv.html" class="font-semibold text-[#003262]">CV</a> <a href="teaching.html" class="hover:text-[#003262] transition-colors">Teaching</a>
                    <a href="about.html" class="hover:text-[#003262] transition-colors">About Me</a>
                    <a href="news.html" class="hover:text-[#003262] transition-colors">News</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 md:p-10">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Curriculum Vitae</h1>
            <a href="BrendanHenriqueCV2026Feb.pdf" target="_blank" rel="noopener noreferrer"
               class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg shadow-md hover:bg-blue-700 transition-colors duration-300">
               View PDF
            </a>
        </div>

        <!-- PDF viewer for all devices using PDF.js -->
        <div class="border border-gray-200 rounded-lg shadow-lg overflow-hidden">
            <!-- Page navigation controls -->
            <div class="flex items-center justify-between bg-gray-100 px-4 py-2 border-b border-gray-200">
                <button id="prev-page"
                        class="bg-white border border-gray-300 text-gray-700 font-medium py-1 px-4 rounded-md hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        disabled>
                    &larr; Prev
                </button>
                <span class="text-sm text-gray-600">
                    Page <span id="page-num">1</span> of <span id="page-count">—</span>
                </span>
                <button id="next-page"
                        class="bg-white border border-gray-300 text-gray-700 font-medium py-1 px-4 rounded-md hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                        disabled>
                    Next &rarr;
                </button>
            </div>

            <!-- Canvas where PDF pages are rendered -->
            <div id="pdf-container" class="bg-white" style="min-height: 70vh;">
                <canvas id="pdf-canvas"></canvas>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-sm text-gray-500">
        <p>&copy; 2026 Brendan Henrique. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const url = 'BrendanHenriqueCV2026Feb.pdf';
        let pdfDoc = null;
        let currentPage = 1;
        let rendering = false;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const prevBtn = document.getElementById('prev-page');
        const nextBtn = document.getElementById('next-page');
        const pageNum = document.getElementById('page-num');
        const pageCount = document.getElementById('page-count');

        function renderPage(num) {
            rendering = true;
            pdfDoc.getPage(num).then(function(page) {
                const container = document.getElementById('pdf-container');
                const containerWidth = container.clientWidth || window.innerWidth;
                const dpr = window.devicePixelRatio || 1;
                const viewport = page.getViewport({ scale: 1 });
                const scale = containerWidth / viewport.width;
                const scaledViewport = page.getViewport({ scale });

                // Set canvas backing store to physical pixels for sharp rendering
                canvas.width = scaledViewport.width * dpr;
                canvas.height = scaledViewport.height * dpr;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                page.render({ canvasContext: ctx, viewport: scaledViewport }).promise.then(function() {
                    rendering = false;
                    pageNum.textContent = num;
                    prevBtn.disabled = num <= 1;
                    nextBtn.disabled = num >= pdfDoc.numPages;
                });
            });
        }

        pdfjsLib.getDocument(url).promise.then(function(pdf) {
            pdfDoc = pdf;
            pageCount.textContent = pdf.numPages;
            nextBtn.disabled = pdf.numPages <= 1;
            renderPage(currentPage);
        });

        prevBtn.addEventListener('click', function() {
            if (currentPage <= 1 || rendering) return;
            currentPage--;
            renderPage(currentPage);
        });

        nextBtn.addEventListener('click', function() {
            if (currentPage >= pdfDoc.numPages || rendering) return;
            currentPage++;
            renderPage(currentPage);
        });

        window.addEventListener('resize', function() {
            if (pdfDoc) renderPage(currentPage);
        });
    </script>

</body>
</html>
